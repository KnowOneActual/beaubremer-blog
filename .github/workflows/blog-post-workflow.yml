name: Latest blog post workflow
on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows you to run it manually anytime

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    name: Update this repo's README with latest blog posts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull in posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          # Pointing directly to the Eleventy-generated feed
          feed_list: "https://blog.beaubremer.com/feed.xml"
          
          # The secret handshake to get past Cloudflare
          user_agent: "Beau-Bremer-Website-Blog-Fetcher/1.0"
          
          # Standard headers
          accept_header: "application/xml, text/xml, application/rss+xml"
